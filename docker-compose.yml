version: '3.8'

services:
  # ── API Gateway (public entry point) ───────────────────────────────────────
  api-gateway:
    build: ./backend/api-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - CLIENT_SERVICE_URL=http://client-service:5001
      - DRIVER_SERVICE_URL=http://driver-service:5002
      - ADMIN_SERVICE_URL=http://admin-service:5003
      - JWT_SECRET=96fef5735f4200d8c1012f61
    depends_on:
      - client-service
      - driver-service
      - admin-service

  # ── Client Service (auth + rides) ──────────────────────────────────────────
  client-service:
    build: ./backend/client-service
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file: ./backend/client-service/.env
    environment:
      - PORT=5001

  # ── Driver Service (profile + status + socket.io) ──────────────────────────
  driver-service:
    build: ./backend/driver-service
    restart: unless-stopped
    ports:
      - "5002:5002"
    env_file: ./backend/driver-service/.env
    environment:
      - PORT=5002

  # ── Admin Service (dashboard proxy) ────────────────────────────────────────
  admin-service:
    build: ./backend/admin-service
    restart: unless-stopped
    ports:
      - "5003:5003"
    env_file: ./backend/admin-service/.env
    environment:
      - PORT=5003
      - CLIENT_SERVICE_URL=http://client-service:5001
      - DRIVER_SERVICE_URL=http://driver-service:5002

  # ── Frontend Apps ───────────────────────────────────────────────────────────
  client-web:
    build:
      context: ./client
      args:
        - VITE_API_URL=http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

  admin-panel:
    build:
      context: ./admin
      args:
        - VITE_API_URL=http://localhost:8000
    ports:
      - "3001:80"
    depends_on:
      - api-gateway

  driver-app:
    build:
      context: ./drivers
      args:
        - VITE_API_BASE_URL=http://localhost:8000
    ports:
      - "3002:80"
    depends_on:
      - api-gateway

networks:
  default:
    name: chardho-go-network

